<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saída do Console</title>
  </head>
  <body>
    <script>
      function esperar() {
        return new Promise((resolve) => {
          setTimeout(() => {
            resolve("Terminou a esperar");
          }, 2000);
        });
      }
      async function iniciar() {
        console.log("Início");
        const resposta = await esperar();
        console.log(resposta);
        console.log("Fim");
      }

      iniciar();
    </script>
  </body>
</html>
