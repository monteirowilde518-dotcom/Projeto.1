<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ex de Botão HTML</title>
  </head>
  <body>
    <button id="btnBuscar">Buscar Usuário</button>

    <p id="resultado"></p>
    
    <script>
      //Lógica javaScript com o Fetch
      const botao = document.querySelector("#btnBuscar");
      const resultado = document.querySelector("#resultado");

      botao.addEventListener("click", async () => {
         resultado.textContent = "Carregando...";

         try {
             const resposta = await fetch(
                 "https://jsonplaceholder.typicode.com/users/1",);
             if (!resposta.ok) throw new Error("Erro");

             const usuario = await resposta.json();
             resultado.textContent = `Nome: ${usuario.name}`;
            } catch (error) {
             resultado.textContent = "Falha ao carregar";
         }
         });
    </script>
  </body>
</html>
