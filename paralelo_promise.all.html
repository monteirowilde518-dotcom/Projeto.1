<html lang="pt-br">

    <title>Paralelo com Promise.all</title>

  <body>
    <script>
      async function carregar() {
        const [u, p] = await Promise.all([
          fetch("https://jsonplaceholder.typicode.com/users/1"),
          fetch("/perdidos"),
        ]);
        console.log(u, p);
      }
    </script>
