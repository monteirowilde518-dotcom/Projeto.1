# Fluxo de trabalho simples para implantar conteúdo estático no GitHub Pages
name: Deploy static content to Pages

on:
  # Executa em pushes que têm como alvo o branch padrão
  push:
    branches: ["main"]

  # Permite que você execute este fluxo de trabalho manualmente a partir da aba Ações
  workflow_dispatch:

# Define as permissões do GITHUB_TOKEN para permitir a implantação no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permitir apenas uma implantação simultânea, pulando execuções enfileiradas entre a execução em andamento e a mais recente enfileirada.
# No entanto, NÃO cancele execuções em andamento, pois queremos permitir que essas implantações de produção sejam concluídas.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job de deploy único, já que estamos apenas fazendo o deploy
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Carregar repositório inteiro
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
